<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Login — ZBighype</title>
  <meta name="description" content="Login to ZBighype admin dashboard for Billing X." />
  <link rel="stylesheet" href="CSS/style.css" />
</head>
<body>
  <div class="bg-particles" aria-hidden="true">
    <div class="milky-way"></div>
    <div class="space-sun"></div>
    <div class="shooting-star ss-1"></div>
    <div class="shooting-star ss-2"></div>
    <div class="shooting-star ss-3"></div>
    <div class="space-planet"></div>
    <div class="space-earth"></div>
    <div class="space-moon-orbit"><div class="space-moon"></div></div>
    <div class="space-ship">🚀</div>
    <div class="ufo ufo-1">🛸</div>
    <div class="ufo ufo-2">🛸</div>
    <div class="ufo ufo-3">🛸</div>
  </div>

  <main class="container" style="min-height: calc(100vh - 40px); display:grid; place-items:center; padding: 28px 0;">
    <section style="width: min(520px, 100%);">
      <div id="loginCard" class="card" style="padding: 20px; border-radius: 26px; background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.12); box-shadow: 0 40px 160px rgba(0,0,0,.75); position:relative; overflow:hidden;">

        <div data-login-glow style="position:absolute; inset:-2px; background: radial-gradient(420px 220px at var(--mx,50%) var(--my,20%), rgba(255,255,255,.18), transparent 55%); opacity:.55; pointer-events:none;"></div>

        <div style="position:relative;">
          <div style="display:flex; align-items:center; gap: 12px;">
            <div class="admin-avatar" style="width:52px; height:52px; border-radius: 18px;">BX</div>
            <div>
              <div style="font-weight: 950; letter-spacing:-.02em; font-size: 18px;">Welcome back</div>
              <div style="color: rgba(255,255,255,.68); font-size: 13px; margin-top: 2px;">Admin access • Billing X</div>
            </div>
          </div>

          <form id="authForm" style="margin-top: 18px;">
            <label style="display:block; font-size: 13px; color: rgba(255,255,255,.72); font-weight: 800; margin-bottom: 8px;">Username</label>
            <input id="username" name="username" autocomplete="username" required
              style="width:100%; padding: 14px 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.30); color: rgba(255,255,255,.95); outline:none; font-size: 14px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);" />

            <div style="height: 14px;"></div>

            <label style="display:block; font-size: 13px; color: rgba(255,255,255,.72); font-weight: 800; margin-bottom: 8px;">Password</label>
            <div style="position:relative;">
              <input id="password" name="password" type="password" autocomplete="current-password" required
                style="width:100%; padding: 14px 52px 14px 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.30); color: rgba(255,255,255,.95); outline:none; font-size: 14px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);" />
              <button id="togglePassword" type="button"
                style="position:absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; border-radius: 14px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); color: rgba(255,255,255,.9); cursor:pointer; transition: transform .18s ease, background .18s ease, border-color .18s ease;">
                👁
              </button>
            </div>

            <div style="display:flex; align-items:center; justify-content:space-between; gap: 12px; margin-top: 12px; flex-wrap:wrap;">
              <label style="display:flex; align-items:center; gap: 10px; color: rgba(255,255,255,.74); font-size: 13px; font-weight: 750; cursor:pointer;">
                <input id="rememberMe" type="checkbox" style="width:16px; height:16px; accent-color: rgba(255,255,255,.85);" />
                Remember me
              </label>
              <div style="color: rgba(255,255,255,.64); font-size: 12px;">
                Use admin credentials
              </div>
            </div>

            <div style="height: 18px;"></div>

            <button id="loginBtn" type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding: 14px 18px; font-weight: 900;">
              <span id="loginSpinner" style="display:none; width:16px; height:16px; border:2px solid rgba(255,255,255,.35); border-top-color: rgba(255,255,255,.95); border-radius:999px; animation: spin 1s linear infinite;"></span>
              <span id="loginBtnText">Login</span>
            </button>

            <style>
              @keyframes spin{ to{ transform: rotate(360deg);} }
            </style>
          </form>

          <div id="toast" aria-live="polite" class="card" style="
              margin-top: 14px;
              padding: 14px;
              border-radius: 18px;
              border: 1px solid rgba(255,255,255,.12);
              background: rgba(255,255,255,.04);
              display:flex;
              gap: 12px;
              align-items:flex-start;
              opacity:0;
              transform: translateY(8px);
              pointer-events:none;
              transition: opacity .25s ease, transform .25s ease;
            " >
            <div style="width: 34px; height:34px; border-radius: 14px; border:1px solid rgba(255,255,255,.12); display:grid; place-items:center;">⚠</div>
            <div style="min-width:0;">
              <div id="toastTitle" style="font-weight: 950; letter-spacing:-.01em;">Error</div>
              <div id="toastMsg" style="color: rgba(255,255,255,.72); font-size: 13px; margin-top:4px;">Wrong credentials.</div>
            </div>
          </div>

          <style>
            #toast.is-open{ opacity: 1 !important; transform: translateY(0) !important; }
            .card.shake{ animation: shake .45s ease; }
            @keyframes shake{ 0%{ transform: translateX(0);} 25%{ transform: translateX(-6px);} 50%{ transform: translateX(6px);} 75%{ transform: translateX(-4px);} 100%{ transform: translateX(0);} }
          </style>

          <div style="margin-top: 14px; color: rgba(255,255,255,.55); font-size: 12px; line-height:1.6;">
            Demo credentials for this admin gate: <b>admin</b> / <b>Admin@2004</b>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="JS/auth.js"></script>
  <script src="JS/theme.js"></script>
</body>
</html>
